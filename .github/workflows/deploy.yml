name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master, main, dev]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy out --project-name=dudu-ai

      - name: Notify Discord
        if: always()
        env:
          PROJECT_NAME: dudu-ai
          STATUS: ${{ job.status }}
        run: |
          DEPLOY_URL="https://dudu-ai.pages.dev"
          if [ "${{ github.ref_name }}" = "dev" ]; then
            DEPLOY_URL="https://dev.dudu-ai.pages.dev"
          fi
          COLOR=5763719
          ICON="🚀"
          if [ "$STATUS" = "failure" ]; then
            COLOR=15548997
            ICON="❌"
          fi
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"${ICON} dudu-ai deployed\",
                \"color\": ${COLOR},
                \"fields\": [
                  {\"name\": \"Branch\", \"value\": \"\`${{ github.ref_name }}\`\", \"inline\": true},
                  {\"name\": \"Commit\", \"value\": \"\`$(echo ${{ github.sha }} | cut -c1-7)\`\", \"inline\": true},
                  {\"name\": \"Status\", \"value\": \"${STATUS}\", \"inline\": true},
                  {\"name\": \"URL\", \"value\": \"${DEPLOY_URL}\", \"inline\": false}
                ],
                \"footer\": {\"text\": \"$(date -u +'%Y-%m-%d %H:%M UTC')\"}
              }]
            }"
